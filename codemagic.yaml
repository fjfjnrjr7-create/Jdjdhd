workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Extract ZIP
        script: |
          cd $CM_BUILD_DIR
          unzip al-quran-kareem.zip -d extracted
          cp -r extracted/* .
      - name: Setup Gradle Wrapper
        script: |
          cd $CM_BUILD_DIR
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew
      - name: Build APK
        script: |
          cd $CM_BUILD_DIR
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
